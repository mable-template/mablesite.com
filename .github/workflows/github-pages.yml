name: Build and Deploy on GitHub Pages

# When push to github-pages branch
on:
  push:
    branches: ["github-pages"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Install Tools
      run: sudo apt-get update && sudo apt-get install -y sassc css-beautify

    - name: Build CSS
      run: make

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
